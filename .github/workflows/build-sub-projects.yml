name: Build changed sub projects
on:
  push:
    branches: [main]
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Find changed projects
        id: changed
        run: |
          CHANGED=$(git diff --dirstat=files,0 HEAD^ HEAD | grep -oP 'sub-project/\w+' | sort | uniq)
          if [ -z "$CHANGED" ]; then
            echo "has_changed=false" >> $GITHUB_OUTPUT
            echo "dirs=" >> $GITHUB_OUTPUT
          else
            echo "has_changed=true" >> $GITHUB_OUTPUT
            echo "dirs=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no changes
        if: steps.changed.outputs.has_changed == 'false'
        run: |
          echo "🛑 No sub-project changed, skip build and deploy."
          exit 0

      - name: Build only changed projects (from project.config.js)
        run: |
          cat > build-changed.js << 'EOF'
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const projects = require('./sub-project/project.config.js');
            const changedDirs = process.argv.slice(2);

            changedDirs.forEach(dir => {
              const name = path.basename(dir);
              const proj = projects.find(p => p.name === name);
              if (!proj) return;

              console.log('\n==================================');
              console.log('打包:', name, '命令:', proj.build);
              console.log('==================================');

              execSync(proj.build, {
                cwd: dir,
                stdio: 'inherit'
              });
            });
          EOF

          node build-changed.js ${{ steps.changed.outputs.dirs }}

      - name: Clean up temp files (fix checkout conflict)
        run: |
          rm -f build-changed.js

      - name: Push dist to vercel-dist (clean rebuild with empty commit check)
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"

          # 1. 缓存 dist 结构
          mkdir -p /tmp/dist-cache/sub-project
          cp -r sub-project/*/dist /tmp/dist-cache/sub-project/ 2>/dev/null || true

          # 2. 强制创建全新 vercel-dist 分支
          git checkout --orphan vercel-dist

          # 3. 清理所有文件（保留 .git）
          git rm -rf .
          rm -rf .github node_modules package* || true

          # 4. 恢复正确的 sub-project/xxx/dist 结构
          cp -r /tmp/dist-cache/* . 2>/dev/null || true

          # 5. 检查是否有文件变更，避免空提交
          if git status --porcelain | grep -q .; then
            git add -f .
            git commit -m "Rebuild vercel-dist with correct structure $(date +%Y-%m-%d)"
            git push -f origin vercel-dist
          else
            echo "✅ No new files to commit, skip push."
          fi
