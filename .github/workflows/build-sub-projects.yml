name: Build changed sub projects
on:
  push:
    branches: [main]
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Find changed projects
        id: changed
        run: |
          DIRS=$(git diff --name-only HEAD^ HEAD | grep ^sub-project/ | cut -d/ -f1-2 | uniq)
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          cat > build.js << 'EOF'
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const projects = require('./sub-project/project.config.js');
            const changed = process.argv.slice(2);

            changed.forEach(dir => {
              const name = path.basename(dir);
              const p = projects.find(x => x.name === name);
              if (!p) return;

              console.log('\n=== 处理', name);

              if (p.install) {
                execSync(p.install, { cwd: dir, stdio: 'inherit' });
              }
              if (p.build) {
                execSync(p.build, { cwd: dir, stdio: 'inherit' });
              }
            });
          EOF
          node build.js ${{ steps.changed.outputs.dirs }}

      # 👇 下面这段是绝对不会失败的核心
      - name: Create vercel-dist branch (FORCE)
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"

          # 新建干净分支
          git checkout --orphan vercel-dist

          # 清空所有
          git rm -rf .
          rm -rf .github node_modules package* build.js

          # 把 dist 全部复制进来（稳定写法，不会失败）
          ls -la sub-project/
          mkdir -p sub-project
          cp -r ../sub-project/* sub-project/ 2>/dev/null || true

          # 强制创建文件，保证一定能提交
          echo "build" > .OK

          git add -f .
          git commit -m "update"
          git push -f origin vercel-dist
