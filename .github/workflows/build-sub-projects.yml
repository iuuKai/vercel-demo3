name: Build changed sub projects
on:
  push:
    branches: [main]
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Find changed projects
        id: changed
        run: |
          DIRS=$(git diff --name-only HEAD^ HEAD | grep ^sub-project/ | cut -d/ -f1-2 | sort -u)
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT

      - name: Build only changed projects (config driven)
        run: |
          cat > build.js << 'EOF'
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const projects = require('./sub-project/project.config.js');
            const changedDirs = process.argv.slice(2);

            changedDirs.forEach(dir => {
              const name = path.basename(dir);
              const proj = projects.find(p => p.name === name);
              if (!proj) return;

              console.log('\n==================================');
              console.log('处理项目:', name);
              console.log('==================================');

              try {
                if (proj.install && typeof proj.install === 'string') {
                  console.log('📦 安装:', proj.install);
                  execSync(proj.install, { cwd: dir, stdio: 'inherit' });
                }
                if (proj.build && typeof proj.build === 'string') {
                  console.log('🔨 打包:', proj.build);
                  execSync(proj.build, { cwd: dir, stdio: 'inherit' });
                }
              } catch (err) {
                console.error('❌ 项目执行失败:', name);
                process.exit(1);
              }
            });
          EOF
          node build.js ${{ steps.changed.outputs.dirs }}

      # 👇 先在 main 分支下缓存所有 dist（关键修复）
      - name: Cache all dist files
        run: |
          mkdir -p /tmp/dist-cache
          cp -r sub-project /tmp/dist-cache/
          ls -la /tmp/dist-cache/sub-project/

      - name: Create vercel-dist branch (FORCE)
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"

          # 新建干净分支
          git checkout --orphan vercel-dist

          # 清空所有
          git rm -rf .
          rm -rf .github node_modules package* build.js || true

          # 从缓存目录恢复所有 dist（绝对不会找不到）
          cp -r /tmp/dist-cache/sub-project .
          ls -la sub-project/

          # 保证一定能提交
          echo "build ok" > .BUILD_OK

          git add -f .
          git commit -m "Auto build vercel-dist $(date +%Y-%m-%d)"
          git push -f origin vercel-dist
